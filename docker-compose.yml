# MHARS — Docker Compose (Full Stack)
# =====================================
# Runs both the FastAPI backend and Next.js dashboard.
#
# Usage:
#   docker-compose up --build          # first time
#   docker-compose up                  # subsequent runs
#   docker-compose down                # stop
#
# Access:
#   Dashboard: http://localhost:3000
#   API:       http://localhost:8000
#   API docs:  http://localhost:8000/docs

version: "3.9"

services:
  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "${MHARS_API_PORT:-8000}:8000"
    environment:
      - MHARS_API_KEY=${MHARS_API_KEY:-}
      - MHARS_CORS_ORIGINS=http://localhost:3000,http://localhost:8000
      - MHARS_SENSOR_MODE=${MHARS_SENSOR_MODE:-simulate}
    volumes:
      - ./models:/app/models:ro       # Mount trained models (read-only)
      - ./results:/app/results         # Mount results directory
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js Dashboard ──────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000/ws/telemetry
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
