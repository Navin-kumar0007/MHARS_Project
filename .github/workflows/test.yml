name: MHARS CI — Tests & Lint

on:
  push:
    branches: [main, web-app-dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-core.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-core.txt
          pip install pytest

      - name: Install MHARS package
        run: pip install -e .

      - name: Run test suite
        run: python -m pytest tests/test_all.py -v --tb=short

      - name: Run pipeline smoke test
        run: python test_pipeline.py

      - name: Run health check test
        run: python test_health.py
